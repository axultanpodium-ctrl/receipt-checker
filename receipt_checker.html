<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка чеков</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:20px;min-height:100vh}
.container{max-width:600px;margin:0 auto;background:#fff;border-radius:16px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
h1{font-size:17px;font-weight:600;margin-bottom:20px;color:#1a1a1a}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.brow label{font-size:13px;color:#666;font-weight:500;white-space:nowrap}
select{flex:1;padding:8px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;color:#1a1a1a;outline:none}
select:focus{border-color:#555}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.zlabel{font-size:12px;color:#666;margin-bottom:6px;font-weight:500}
.zone{border:1.5px dashed #ccc;border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer;background:#fafaf8;min-height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all 0.12s;user-select:none}
.zone:hover{background:#f0f0ec;border-color:#999}
.zone.has{border-style:solid;border-color:#3b7dd8;background:#eef4ff}
.zi{font-size:22px;color:#999}
.zt{font-size:13px;font-weight:500;color:#333}
.zh{font-size:11px;color:#999}
.tgrid{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;justify-content:center}
.th{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid #eee}
.td{width:48px;height:48px;border-radius:6px;border:1px solid #eee;background:#f5f5f0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#999;text-align:center;padding:3px;word-break:break-all}
button#btn{width:100%;padding:11px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
button#btn:hover{opacity:.85}
button#btn:disabled{background:#ccc;border-color:#ccc;cursor:not-allowed;opacity:1}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.metric{background:#f5f5f0;border-radius:8px;padding:10px 12px}
.mlabel{font-size:11px;color:#999;margin-bottom:3px}
.mval{font-size:19px;font-weight:500;color:#1a1a1a}
.mval.ok{color:#1a7a4a}
.mval.err{color:#c0392b}
.mval.warn{color:#b07800}
.alert{padding:9px 12px;border-radius:8px;margin-bottom:7px;font-size:13px;line-height:1.5;border:1px solid}
.aw{background:#fff8e1;border-color:#f0c040;color:#7a5800}
.ae{background:#fdecea;border-color:#f5a9a0;color:#c0392b}
.as{background:#eafaf1;border-color:#82d9a8;color:#1a7a4a}
.ab{background:#eef4ff;border-color:#90b8f0;color:#1a4a9a}
.stitle{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
.rcard{background:#fafaf8;border-radius:10px;border:1px solid #e8e8e4;padding:10px 12px;margin-bottom:7px}
.rcard.nc{border-color:#f0c040;background:#fff8e1}
.rcard.mc{border-color:#90b8f0;background:#eef4ff}
.rcard.oc{border-color:#82d9a8}
.rcard.sk{opacity:.5}
.rhead{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.rnum{font-size:14px;font-weight:500;color:#1a1a1a}
.tag{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;display:inline-block}
.tg{background:#eafaf1;color:#1a7a4a}
.tr{background:#fdecea;color:#c0392b}
.tm{background:#f0f0ec;color:#888}
.ty{background:#fff8e1;color:#7a5800}
.tb{background:#eef4ff;color:#1a4a9a}
.ramt{font-size:15px;font-weight:500;color:#1a1a1a}
.rnote{font-size:11px;color:#999;margin-top:2px}
.meta{font-size:12px;color:#999;margin-bottom:8px}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #ddd;border-top-color:#3b7dd8;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.status{margin-top:10px;font-size:13px;color:#666;text-align:center;min-height:18px}
#res{margin-top:16px}
</style>
</head>
<body>
<div class="container">
  <h1><i class="ti ti-receipt"></i> Проверка чеков</h1>

  <div class="brow" style="margin-bottom:8px">
    <span style="font-size:13px;color:#666;font-weight:500;white-space:nowrap">API ключ</span>
    <input id="apikey" type="password" placeholder="sk-ant-..." style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;color:#1a1a1a;outline:none">
  </div>
  <div class="brow">
    <label for="bt">Бутик</label>
    <select id="bt">
      <option value="">— выбери бутик —</option>
      <option value="essentai">Есентай (Подиум / Attolini)</option>
      <option value="keruen">Керуен (Подиум Астана)</option>
      <option value="nursaya">Нурсая (Подиум Астана)</option>
      <option value="canali">Canali Астана</option>
      <option value="stefano">Stefano Ricci Астана</option>
    </select>
  </div>

  <div class="row2">
    <div>
      <p class="zlabel">Чеки (JPG / PNG / PDF)</p>
      <div class="zone" id="zr" onclick="document.getElementById('ir').click()">
        <i class="ti ti-receipt zi"></i>
        <span class="zt">Загрузить чеки</span>
        <span class="zh">Можно несколько файлов</span>
        <div class="tgrid" id="tr"></div>
      </div>
      <input type="file" id="ir" accept="image/*,application/pdf" multiple style="display:none">
    </div>
    <div>
      <p class="zlabel">Продажный лист (необязательно)</p>
      <div class="zone" id="zs" onclick="document.getElementById('is').click()">
        <i class="ti ti-file-description zi"></i>
        <span class="zt">Загрузить продажку</span>
        <span class="zh">JPG / PNG / PDF</span>
        <div class="tgrid" id="ts"></div>
      </div>
      <input type="file" id="is" accept="image/*,application/pdf" multiple style="display:none">
    </div>
  </div>

  <button id="btn" disabled>
    <i class="ti ti-search"></i> Проверить
  </button>
  <div class="status" id="st"></div>
  <div id="res"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

const rF=[],sF=[];

function setupInput(inputId,zoneId,tgId,arr){
  document.getElementById(inputId).addEventListener('change',function(){
    Array.from(this.files).forEach(f=>{
      if(!arr.find(x=>x.name===f.name&&x.size===f.size))arr.push(f);
    });
    renderT(arr,document.getElementById(tgId),document.getElementById(zoneId));
    checkReady();
  });
}
setupInput('ir','zr','tr',rF);

// Сохраняем и загружаем API ключ
const apikeyInp=document.getElementById('apikey');
const savedKey=localStorage.getItem('anthropic_api_key');
if(savedKey)apikeyInp.value=savedKey;
apikeyInp.addEventListener('change',()=>localStorage.setItem('anthropic_api_key',apikeyInp.value.trim()));
setupInput('is','zs','ts',sF);

document.getElementById('bt').addEventListener('change',function(){
  rF.length=0;sF.length=0;
  renderT(rF,document.getElementById('tr'),document.getElementById('zr'));
  renderT(sF,document.getElementById('ts'),document.getElementById('zs'));
  document.getElementById('res').innerHTML='';
  document.getElementById('st').innerHTML='';
  document.getElementById('ir').value='';
  document.getElementById('is').value='';
  checkReady();
});

function renderT(files,tg,zone){
  tg.innerHTML='';
  files.forEach(f=>{
    if(f.type.startsWith('image/')){
      const img=document.createElement('img');img.className='th';img.src=URL.createObjectURL(f);tg.appendChild(img);
    } else {
      const d=document.createElement('div');d.className='td';d.textContent=f.name.slice(0,10);tg.appendChild(d);
    }
  });
  zone.classList.toggle('has',files.length>0);
}

function checkReady(){document.getElementById('btn').disabled=rF.length===0;}

async function pdfToImgs(file){
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  const imgs=[];
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const vp=page.getViewport({scale:1.8});
    const cv=document.createElement('canvas');
    cv.width=vp.width;cv.height=vp.height;
    await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    imgs.push(cv.toDataURL('image/jpeg',0.88).split(',')[1]);
  }
  return imgs;
}

async function fileToParts(file){
  if(file.type==='application/pdf'){
    const pages=await pdfToImgs(file);
    return pages.map(b64=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}}));
  }
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res([{type:'image',source:{type:'base64',media_type:file.type,data:r.result.split(',')[1]}}]);
    r.onerror=rej;r.readAsDataURL(file);
  });
}

function extractJson(raw){
  const start=raw.indexOf('{');
  if(start===-1)return null;
  let depth=0,inStr=false,esc=false;
  for(let i=start;i<raw.length;i++){
    const c=raw[i];
    if(inStr){
      if(esc){esc=false;}
      else if(c==='\\'){esc=true;}
      else if(c==='"'){inStr=false;}
      continue;
    }
    if(c==='"'){inStr=true;continue;}
    if(c==='{')depth++;
    else if(c==='}'){
      depth--;
      if(depth===0)return raw.slice(start,i+1);
    }
  }
  return null; // не нашли закрывающую скобку — ответ обрезан
}

function fmt(n){if(!n&&n!==0)return'—';return Number(n).toLocaleString('ru-RU')+' ₸';}

const bCtx={
  essentai:'Есентай (Подиум/Attolini, Алматы). Чеки текстовые PDF. Продажка рукописная таблица: №чека, наименование, артикул, цена, скидка%, сумма, клиент/№карты. Итоги: Наличные/Карта/GR/Оми.сертификат/Итого.',
  keruen:'Керуен (Подиум Астана, ТЦ Керуен). Чеки текстовые PDF формат Подиум. Продажка рукописная таблица.',
  nursaya:'Нурсая (Подиум Астана, ТЦ Нурсая). Чеки текстовые PDF формат Подиум. Продажка рукописная.',
  canali:'Canali Астана. Чеки текстовые формат Canali, строка "ДК:" с номером. Продажка рукописная таблица.',
  stefano:'Stefano Ricci Астана. Чеки текстовые формат SR, строка "ДК:". Сертификаты (Подарочный сертификат SR) — не считать. Продажка рукописная таблица.',
};

const PROMPT=`Ты помощник по проверке розничных продаж в fashion-бутиках.
Бутик: {BOUTIQUE}

ПРАВИЛА ПОДСЧЁТА:
1. Обычные продажи — СЧИТАЕМ. Берём строку "Итого"/"Всего"/"Bcero" каждого чека.
2. Подарочные сертификаты (товар = "Подарочный сертификат", "Сертификат SR" и т.п.) — НЕ СЧИТАЕМ, type="сертификат", counted=false.
3. Оплата сертификатом = способ оплаты, товар продан — СЧИТАЕМ.
4. Обмен равноценный — НЕ СЧИТАЕМ, counted=false.
5. Обмен с доплатой — считаем ТОЛЬКО доплату.
6. Возврат без обмена — ВЫЧИТАЕМ (отрицательная сумма), type="возврат".
7. Терминальные чеки (Halyk, Kaspi, Forte, сверка итогов, отчёт по картам) — ИГНОРИРУЕМ полностью, не включать в receipts.
8. ПЕРЕЧИСЛЕНИЯ: если в продажном листе есть строка "перечисление" (оплата напрямую в бухгалтерию) — занести её в salesSheet.transferSum. При сравнении итогов: receiptsSum + salesSheet.transferSum должно равняться salesSheet.total.

ПРАВИЛА ПО ДИСКОНТНОЙ КАРТЕ (строка "ДК:" в чеке):
- "ДК:" + номер телефона (11 цифр, начинается с 8, например 87755826909) → cardStatus="ok", cardNumber=номер
- "ДК:" пустая → cardStatus="no_card"
- "ДК:" содержит имя, фамилию или любое слово вместо номера телефона → cardStatus="manual" (уточнить у товароведа)
- Указана причина: "Отказ", "Отказ от рег.", "Отказ от регистрации", "Бишкек", "Грузины", "Иностранцы", "Иностр.", "нет" и т.п. → cardStatus="declined", cardNote=причина дословно

ВАЖНО: Твой ответ должен начинаться с { и заканчиваться }. Никакого текста до или после. Только JSON.

Ответь СТРОГО только JSON без markdown, без текста:
{"boutique":"","date":"","cashier":"","receipts":[{"number":"","total":0,"type":"продажа","cardStatus":"ok","cardNumber":"","cardNote":"","counted":true,"note":""}],"receiptsSum":0,"receiptsCount":0,"salesSheet":{"found":false,"total":0,"count":0,"cashier":"","date":"","transferSum":0,"note":""},"match":{"sumOk":true,"sumDiff":0,"countNote":""},"noCardList":[],"manualCardList":[],"declinedList":[]}`;

async function callClaudeAndParse(parts,apiKey,st,attempt,maxAttempts){
  st.innerHTML=`<span class="spinner"></span> AI анализирует${attempt>1?' (попытка '+attempt+' из '+maxAttempts+')':''}...`;
  let resp;
  try{
    resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:16000,system:'Ты возвращаешь ТОЛЬКО валидный JSON. Никакого текста, никаких пояснений, никакого markdown, никаких комментариев внутри JSON. Первый символ ответа — {, последний — }.',messages:[{role:'user',content:parts}]})
    });
  }catch(netErr){
    // сетевая ошибка (обрыв соединения и т.п.) — пробуем ещё раз
    if(attempt<maxAttempts)return callClaudeAndParse(parts,apiKey,st,attempt+1,maxAttempts);
    throw new Error('Не удалось связаться с API после '+maxAttempts+' попыток: '+netErr.message);
  }
  const data=await resp.json();
  if(data.error){
    // ошибки авторизации/квоты повторять бессмысленно — сразу наверх
    if(/auth|key|permission|billing|credit/i.test(data.error.message||'')||attempt>=maxAttempts){
      throw new Error(data.error.message);
    }
    return callClaudeAndParse(parts,apiKey,st,attempt+1,maxAttempts);
  }
  const raw=(data.content||[]).map(x=>x.text||'').join('');
  const jsonStr=extractJson(raw);
  if(jsonStr){
    try{
      return JSON.parse(jsonStr);
    }catch(parseErr){
      // JSON нашёлся, но невалиден — пробуем ещё раз
    }
  }
  if(attempt<maxAttempts){
    return callClaudeAndParse(parts,apiKey,st,attempt+1,maxAttempts);
  }
  throw new Error('Не удалось получить корректный JSON от API после '+maxAttempts+' попыток. Попробуйте загрузить меньше чеков за раз.');
}

document.getElementById('btn').addEventListener('click',async()=>{
  const btn=document.getElementById('btn'),st=document.getElementById('st'),res=document.getElementById('res');
  const bv=document.getElementById('bt').value;
  const apiKey=document.getElementById('apikey').value.trim();
  if(!apiKey){st.innerHTML='<span style="color:#c0392b">Введите API ключ</span>';btn.disabled=false;return;}
  btn.disabled=true;res.innerHTML='';
  try{
    st.innerHTML='<span class="spinner"></span> Конвертирую файлы...';
    const parts=[{type:'text',text:PROMPT.replace('{BOUTIQUE}',bCtx[bv]||'не указан')}];
    for(const f of rF){const p=await fileToParts(f);parts.push(...p);}
    if(sF.length>0){
      parts.push({type:'text',text:'Далее — продажный лист:'});
      for(const f of sF){const p=await fileToParts(f);parts.push(...p);}
    }
    const d=await callClaudeAndParse(parts,apiKey,st,1,3);
    st.innerHTML='';render(d,res);
  }catch(e){
    st.innerHTML='<span style="color:#c0392b"><i class="ti ti-alert-circle"></i> '+e.message+'</span>';
    btn.disabled=false;
  }
});

function render(d,el){
  const hasSales=d.salesSheet&&d.salesSheet.found;
  const sumOk=d.match&&d.match.sumOk;
  const noCards=d.noCardList||[];const manuals=d.manualCardList||[];
  
  let h='';

  if(d.boutique||d.date||d.cashier){
    h+=`<div class="meta">${[d.boutique,d.date,d.cashier?'кассир: '+d.cashier:''].filter(Boolean).join(' · ')}</div>`;
  }

  h+='<div class="metrics">';
  h+=`<div class="metric"><div class="mlabel">Сумма по чекам</div><div class="mval">${fmt(d.receiptsSum)}</div></div>`;
  if(hasSales){
    h+=`<div class="metric"><div class="mlabel">Продажный лист</div><div class="mval">${fmt(d.salesSheet.total)}</div></div>`;
    const transfer=d.salesSheet.transferSum||0;
    const effectiveSum=d.receiptsSum+(transfer);
    const diff=effectiveSum-d.salesSheet.total;
    const isOk=Math.abs(diff)<10;
    h+=`<div class="metric"><div class="mlabel">Расхождение</div><div class="mval ${isOk?'ok':'err'}">${isOk?'✓ совпадает':(diff>0?'+':'')+fmt(Math.abs(diff))}</div></div>`;
  } else {
    h+=`<div class="metric"><div class="mlabel">Чеков учтено</div><div class="mval">${d.receiptsCount||0}</div></div>`;
    h+=`<div class="metric"><div class="mlabel">Проблем с картой</div><div class="mval ${noCards.length>0?'warn':'ok'}">${noCards.length}</div></div>`;
  }
  h+='</div>';

  if(hasSales&&d.match&&d.match.countNote)h+=`<div class="meta">${d.match.countNote}</div>`;
  const transfer=d.salesSheet&&d.salesSheet.transferSum||0;
  if(hasSales&&transfer>0)h+=`<div class="alert ab"><i class="ti ti-arrows-transfer-up"></i> Перечисление: <strong>${fmt(transfer)}</strong> — оплата напрямую в бухгалтерию. Итого чеки + перечисление: ${fmt((d.receiptsSum||0)+transfer)}</div>`;

  if(hasSales&&!sumOk){
    const diff=d.match?d.match.sumDiff:(d.receiptsSum-d.salesSheet.total);
    h+=`<div class="alert ae"><i class="ti ti-alert-triangle"></i> Расхождение ${diff>0?'+':''}${fmt(Math.abs(diff))} · чеки: ${fmt(d.receiptsSum)} · продажка: ${fmt(d.salesSheet.total)}</div>`;
  } else if(hasSales&&sumOk){
    h+=`<div class="alert as"><i class="ti ti-check"></i> Суммы совпадают</div>`;
  }

  if(noCards.length>0){
    h+=`<div class="alert aw"><i class="ti ti-credit-card-off"></i> Нет карты — отправить скриншот продавцу: <strong>чек${noCards.length>1?'и':''} №${noCards.join(', №')}</strong></div>`;
  }
  if(manuals.length>0){
    h+=`<div class="alert ab"><i class="ti ti-pencil"></i> ДК вписан вручную — уточнить у товароведа: <strong>чек${manuals.length>1?'и':''} №${manuals.join(', №')}</strong></div>`;
  }
  if(noCards.length===0&&manuals.length===0&&(d.receipts||[]).some(r=>r.counted)){
    h+=`<div class="alert as"><i class="ti ti-check"></i> Все карты в порядке</div>`;
  }

  h+='<div class="stitle">Детально по чекам</div>';
  (d.receipts||[]).forEach(r=>{
    const cls=!r.counted?'sk':r.cardStatus==='no_card'?'nc':r.cardStatus==='manual'?'mc':r.cardStatus==='ok'?'oc':'';
    const ttag=r.type==='продажа'?'tg':r.type==='возврат'?'tr':'tm';
    let ch='';
    if(r.cardStatus==='ok')ch=`<span class="tag tg"><i class="ti ti-credit-card"></i> ${r.cardNumber||'ДК ✓'}</span>`;
    else if(r.cardStatus==='no_card')ch=`<span class="tag ty"><i class="ti ti-credit-card-off"></i> нет карты</span>`;
    else if(r.cardStatus==='manual')ch=`<span class="tag tb"><i class="ti ti-pencil"></i> ДК вручную</span>`;
    else if(r.cardStatus==='declined')ch=`<span class="tag tm"><i class="ti ti-x"></i> ${r.cardNote||'отказ от регистрации'}</span>`;
    h+=`<div class="rcard ${cls}">
      <div class="rhead">
        <span class="rnum">Чек №${r.number}</span>
        <span class="tag ${ttag}">${r.type}</span>
        ${!r.counted?'<span class="tag tm">не в сумме</span>':''}
        ${ch}
      </div>
      <div class="ramt">${fmt(r.total)}</div>
      ${r.note?`<div class="rnote">${r.note}</div>`:''}
      ${r.cardStatus==='declined'&&r.cardNote?`<div class="rnote"><i class="ti ti-info-circle"></i> ${r.cardNote}</div>`:''}
    </div>`;
  });

  el.innerHTML=h;
  document.getElementById('btn').disabled=false;
}
</script>
</body>
</html>
