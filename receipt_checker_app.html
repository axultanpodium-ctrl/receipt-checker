
<h2 class="sr-only">Приложение для проверки кассовых чеков и продажных листов</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.zlabel{font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:500}
.zone{border:1.5px dashed var(--border-strong);border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer;background:var(--surface-2);min-height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:background 0.12s}
.zone:hover{background:var(--surface-1)}
.zone.has{border-style:solid;border-color:var(--border-accent);background:var(--bg-accent)}
.zi{font-size:20px;color:var(--text-muted)}
.zt{font-size:13px;font-weight:500;color:var(--text-primary)}
.zh{font-size:11px;color:var(--text-muted)}
.tgrid{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;justify-content:center}
.th{width:48px;height:48px;object-fit:cover;border-radius:6px;border:0.5px solid var(--border)}
.td{width:48px;height:48px;border-radius:6px;border:0.5px solid var(--border);background:var(--surface-1);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-muted);text-align:center;padding:3px;word-break:break-all}
input[type=file]{display:none}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.brow label{font-size:13px;color:var(--text-secondary);font-weight:500;white-space:nowrap}
select{flex:1;padding:7px 10px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);font-size:13px;color:var(--text-primary)}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.metric{background:var(--surface-1);border-radius:var(--radius);padding:10px 12px}
.mlabel{font-size:11px;color:var(--text-muted);margin-bottom:3px}
.mval{font-size:19px;font-weight:500;color:var(--text-primary)}
.mval.ok{color:var(--text-success)}
.mval.err{color:var(--text-danger)}
.mval.warn{color:var(--text-warning)}
.alert{padding:9px 12px;border-radius:var(--radius);margin-bottom:7px;font-size:13px;line-height:1.5;border:0.5px solid}
.aw{background:var(--bg-warning);border-color:var(--border-warning);color:var(--text-warning)}
.ae{background:var(--bg-danger);border-color:var(--border-danger);color:var(--text-danger)}
.as{background:var(--bg-success);border-color:var(--border-success);color:var(--text-success)}
.ab{background:var(--bg-accent);border-color:var(--border-accent);color:var(--text-accent)}
.stitle{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px}
.rcard{background:var(--surface-2);border-radius:10px;border:0.5px solid var(--border);padding:10px 12px;margin-bottom:7px}
.rcard.nc{border-color:var(--border-warning);background:var(--bg-warning)}
.rcard.mc{border-color:var(--border-accent);background:var(--bg-accent)}
.rcard.oc{border-color:var(--border-success)}
.rcard.sk{opacity:.5}
.rhead{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.rnum{font-size:14px;font-weight:500;color:var(--text-primary)}
.tag{font-size:11px;padding:1px 7px;border-radius:99px;font-weight:500;display:inline-block}
.tg{background:var(--bg-success);color:var(--text-success)}
.tr{background:var(--bg-danger);color:var(--text-danger)}
.tm{background:var(--surface-1);color:var(--text-muted)}
.ty{background:var(--bg-warning);color:var(--text-warning)}
.tb{background:var(--bg-accent);color:var(--text-accent)}
.ramt{font-size:15px;font-weight:500;color:var(--text-primary)}
.rnote{font-size:11px;color:var(--text-muted);margin-top:2px}
.meta{font-size:12px;color:var(--text-muted);margin-bottom:8px}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--text-accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.status{margin-top:10px;font-size:13px;color:var(--text-secondary);text-align:center;min-height:18px}
</style>

<div class="wrap">
  <div class="brow">
    <label for="bt">Бутик</label>
    <select id="bt">
      <option value="">— выбери бутик —</option>
      <option value="essentai">Есентай (Подиум / Attolini)</option>
      <option value="keruen">Керуен (Подиум Астана)</option>
      <option value="nursaya">Нурсая (Подиум Астана)</option>
      <option value="canali">Canali Астана</option>
      <option value="stefano">Stefano Ricci Астана</option>
    </select>
  </div>

  <div class="row2">
    <div>
      <p class="zlabel">Чеки (JPG / PNG / PDF)</p>
      <label class="zone" id="zr" for="ir">
        <i class="ti ti-receipt zi" aria-hidden="true"></i>
        <span class="zt">Загрузить чеки</span>
        <span class="zh">Можно несколько файлов</span>
        <div class="tgrid" id="tr"></div>
      </label>
      <input type="file" id="ir" accept="image/*,application/pdf" multiple>
    </div>
    <div>
      <p class="zlabel">Продажный лист (необязательно)</p>
      <label class="zone" id="zs" for="is">
        <i class="ti ti-file-description zi" aria-hidden="true"></i>
        <span class="zt">Загрузить продажку</span>
        <span class="zh">JPG / PNG / PDF</span>
        <div class="tgrid" id="ts"></div>
      </label>
      <input type="file" id="is" accept="image/*,application/pdf" multiple>
    </div>
  </div>

  <button id="btn" disabled style="width:100%;padding:10px">
    <i class="ti ti-search" aria-hidden="true"></i> Проверить
  </button>
  <div class="status" id="st"></div>
  <div id="res"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

const rF=[],sF=[];

function setup(iid,zid,tid,arr){
  const inp=document.getElementById(iid),zone=document.getElementById(zid),tg=document.getElementById(tid);
  inp.addEventListener('change',()=>{
    Array.from(inp.files).forEach(f=>{if(!arr.find(x=>x.name===f.name&&x.size===f.size))arr.push(f);});
    renderT(arr,tg,zone);checkReady();
  });
}

function renderT(files,tg,zone){
  tg.innerHTML='';
  files.forEach(f=>{
    if(f.type.startsWith('image/')){
      const img=document.createElement('img');img.className='th';img.src=URL.createObjectURL(f);tg.appendChild(img);
    } else {
      const d=document.createElement('div');d.className='td';d.textContent=f.name.slice(0,10);tg.appendChild(d);
    }
  });
  zone.classList.toggle('has',files.length>0);
}

function checkReady(){document.getElementById('btn').disabled=rF.length===0;}
setup('ir','zr','tr',rF);setup('is','zs','ts',sF);

async function pdfToImgs(file){
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  const imgs=[];
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const vp=page.getViewport({scale:1.8});
    const cv=document.createElement('canvas');
    cv.width=vp.width;cv.height=vp.height;
    await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    imgs.push(cv.toDataURL('image/jpeg',0.88).split(',')[1]);
  }
  return imgs;
}

async function fileToParts(file){
  if(file.type==='application/pdf'){
    const pages=await pdfToImgs(file);
    return pages.map(b64=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}}));
  }
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res([{type:'image',source:{type:'base64',media_type:file.type,data:r.result.split(',')[1]}}]);
    r.onerror=rej;r.readAsDataURL(file);
  });
}

function fmt(n){if(!n&&n!==0)return'—';return Number(n).toLocaleString('ru-RU')+' ₸';}

const bCtx={
  essentai:'Есентай (Подиум/Attolini, Алматы). Чеки текстовые PDF. Продажка рукописная таблица: №чека, наименование, артикул, цена, скидка%, сумма, клиент/№карты. Итоги: Наличные/Карта/GR/Оми.сертификат/Итого.',
  keruen:'Керуен (Подиум Астана, ТЦ Керуен). Чеки текстовые PDF формат Подиум. Продажка рукописная таблица.',
  nursaya:'Нурсая (Подиум Астана, ТЦ Нурсая). Чеки текстовые PDF формат Подиум. Продажка рукописная.',
  canali:'Canali Астана. Чеки текстовые формат Canali, строка "ДК:" с номером. Продажка рукописная таблица.',
  stefano:'Stefano Ricci Астана. Чеки текстовые формат SR, строка "ДК:". Сертификаты (Подарочный сертификат SR) — не считать. Продажка рукописная таблица.',
};

const PROMPT=`Ты помощник по проверке розничных продаж в fashion-бутиках.
Бутик: {BOUTIQUE}

ПРАВИЛА ПОДСЧЁТА:
1. Обычные продажи — СЧИТАЕМ. Берём строку "Итого"/"Всего"/"Bcero" каждого чека.
2. Подарочные сертификаты (товар = "Подарочный сертификат", "Сертификат SR" и т.п.) — НЕ СЧИТАЕМ, type="сертификат", counted=false.
3. Оплата сертификатом = способ оплаты, товар продан — СЧИТАЕМ.
4. Обмен равноценный — НЕ СЧИТАЕМ, counted=false.
5. Обмен с доплатой — считаем ТОЛЬКО доплату.
6. Возврат без обмена — ВЫЧИТАЕМ (отрицательная сумма), type="возврат".
7. Терминальные чеки (Halyk, Kaspi, Forte, сверка итогов, отчёт по картам) — ИГНОРИРУЕМ полностью, не включать в receipts.

ПРАВИЛА ПО ДИСКОНТНОЙ КАРТЕ (строка "ДК:" в чеке):
- "ДК:" + цифровой номер (8-11 цифр) → cardStatus="ok", cardNumber=номер
- "ДК:" пустая или номера нет → cardStatus="no_card" (нужно отправить скриншот продавцу)
- В строке ДК вписано от руки имя/слово вместо номера (напр. "aza", "Айгуль", "карта") → cardStatus="manual" (уточнить у товароведа)
- Указана причина: "Отказ от рег.", "Бишкек", "Грузины", "нет" и т.п. → cardStatus="declined", cardNote=причина дословно

Ответь СТРОГО только JSON без markdown:
{"boutique":"","date":"","cashier":"","receipts":[{"number":"","total":0,"type":"продажа","cardStatus":"ok","cardNumber":"","cardNote":"","counted":true,"note":""}],"receiptsSum":0,"receiptsCount":0,"salesSheet":{"found":false,"total":0,"count":0,"cashier":"","date":"","note":""},"match":{"sumOk":true,"sumDiff":0,"countNote":""},"noCardList":[],"manualCardList":[],"declinedList":[]}`;

document.getElementById('btn').addEventListener('click',async()=>{
  const btn=document.getElementById('btn'),st=document.getElementById('st'),res=document.getElementById('res');
  const bv=document.getElementById('bt').value;
  btn.disabled=true;res.innerHTML='';
  try{
    st.innerHTML='<span class="spinner"></span> Конвертирую файлы...';
    const parts=[{type:'text',text:PROMPT.replace('{BOUTIQUE}',bCtx[bv]||'не указан')}];
    for(const f of rF){const p=await fileToParts(f);parts.push(...p);}
    if(sF.length>0){
      parts.push({type:'text',text:'Далее — продажный лист:'});
      for(const f of sF){const p=await fileToParts(f);parts.push(...p);}
    }
    st.innerHTML='<span class="spinner"></span> AI анализирует...';
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,messages:[{role:'user',content:parts}]})
    });
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    const raw=(data.content||[]).map(x=>x.text||'').join('');
    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());
    st.innerHTML='';render(d,res);
  }catch(e){
    st.innerHTML='<span style="color:var(--text-danger)"><i class="ti ti-alert-circle"></i> '+e.message+'</span>';
    btn.disabled=false;
  }
});

function render(d,el){
  const hasSales=d.salesSheet&&d.salesSheet.found;
  const sumOk=d.match&&d.match.sumOk;
  const noCards=d.noCardList||[];
  const manuals=d.manualCardList||[];
  let h='';

  if(d.boutique||d.date||d.cashier){
    h+=`<div class="meta">${[d.boutique,d.date,d.cashier?'кассир: '+d.cashier:''].filter(Boolean).join(' · ')}</div>`;
  }

  h+='<div class="metrics">';
  h+=`<div class="metric"><div class="mlabel">Сумма по чекам</div><div class="mval">${fmt(d.receiptsSum)}</div></div>`;
  if(hasSales){
    h+=`<div class="metric"><div class="mlabel">Продажный лист</div><div class="mval">${fmt(d.salesSheet.total)}</div></div>`;
    const diff=d.match?d.match.sumDiff:0;
    h+=`<div class="metric"><div class="mlabel">Расхождение</div><div class="mval ${sumOk?'ok':'err'}">${sumOk?'✓ совпадает':(diff>0?'+':'')+fmt(Math.abs(diff))}</div></div>`;
  } else {
    h+=`<div class="metric"><div class="mlabel">Чеков учтено</div><div class="mval">${d.receiptsCount||0}</div></div>`;
    h+=`<div class="metric"><div class="mlabel">Проблем с картой</div><div class="mval ${(noCards.length+manuals.length)>0?'warn':'ok'}">${noCards.length+manuals.length}</div></div>`;
  }
  h+='</div>';

  if(hasSales&&d.match&&d.match.countNote)h+=`<div class="meta">${d.match.countNote}</div>`;

  if(hasSales&&!sumOk){
    const diff=d.match?d.match.sumDiff:(d.receiptsSum-d.salesSheet.total);
    h+=`<div class="alert ae"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Расхождение ${diff>0?'+':''}${fmt(Math.abs(diff))} · чеки: ${fmt(d.receiptsSum)} · продажка: ${fmt(d.salesSheet.total)}</div>`;
  } else if(hasSales&&sumOk){
    h+=`<div class="alert as"><i class="ti ti-check" aria-hidden="true"></i> Суммы совпадают</div>`;
  }

  if(noCards.length>0){
    h+=`<div class="alert aw"><i class="ti ti-credit-card-off" aria-hidden="true"></i> Нет карты — отправить скриншот продавцу: <strong>чек${noCards.length>1?'и':''} №${noCards.join(', №')}</strong></div>`;
  }
  if(manuals.length>0){
    h+=`<div class="alert ab"><i class="ti ti-pencil" aria-hidden="true"></i> ДК вписан вручную — уточнить у товароведа: <strong>чек${manuals.length>1?'и':''} №${manuals.join(', №')}</strong></div>`;
  }
  if(noCards.length===0&&manuals.length===0&&(d.receipts||[]).some(r=>r.counted)){
    h+=`<div class="alert as"><i class="ti ti-check" aria-hidden="true"></i> Все карты в порядке</div>`;
  }

  h+='<div class="stitle">Детально по чекам</div>';
  (d.receipts||[]).forEach(r=>{
    const cls=!r.counted?'sk':r.cardStatus==='no_card'?'nc':r.cardStatus==='manual'?'mc':r.cardStatus==='ok'?'oc':'';
    const ttag=r.type==='продажа'?'tg':r.type==='возврат'?'tr':'tm';
    let ch='';
    if(r.cardStatus==='ok')ch=`<span class="tag tg"><i class="ti ti-credit-card" aria-hidden="true"></i> ${r.cardNumber||'ДК ✓'}</span>`;
    else if(r.cardStatus==='no_card')ch=`<span class="tag ty"><i class="ti ti-credit-card-off" aria-hidden="true"></i> нет карты</span>`;
    else if(r.cardStatus==='manual')ch=`<span class="tag tb"><i class="ti ti-pencil" aria-hidden="true"></i> ДК вручную</span>`;
    else if(r.cardStatus==='declined')ch=`<span class="tag tm">${r.cardNote||'отказ'}</span>`;
    h+=`<div class="rcard ${cls}">
      <div class="rhead">
        <span class="rnum">Чек №${r.number}</span>
        <span class="tag ${ttag}">${r.type}</span>
        ${!r.counted?'<span class="tag tm">не в сумме</span>':''}
        ${ch}
      </div>
      <div class="ramt">${fmt(r.total)}</div>
      ${r.note?`<div class="rnote">${r.note}</div>`:''}
    </div>`;
  });

  el.innerHTML=h;
  document.getElementById('btn').disabled=false;
}
</script>
